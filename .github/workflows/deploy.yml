name: Build and Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出当前仓库
      - name: Checkout current repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装当前项目的依赖 (生成 node_modules)
      - name: Install dependencies
        run: npm install

      # 4. 克隆并构建外部 Vue 项目 (生成 web 文件夹内容)
      - name: Clone and Build External Vue
        run: |
          git clone https://github.com/sparkbridge/sparkui.git external-vue-app
          cd external-vue-app
          npm install
          npm run build
          cd ..
          mkdir -p web
          cp -r ./external-vue-app/dist/* ./web/
          rm -rf ./external-vue-app

      # - name: Generate Update Manifest
      #   run: node scripts/generate_manifest.js

      # 5. 执行你指定的 7z 打包命令
      # 严格按照你提供的列表进行打包
      - name: Package Project with 7z
        run: |
          7z a -tzip -mx=5 -mm=deflate sparkbridge3.zip \
          adapters \
          handles \
          core \
          node_modules \
          plugins \
          web \
          index.js \
          logo.txt \
          manifest.json \
          package.json

      # - name: Install dependencies
      #   run: npm install axios cheerio form-data qs

      # - name: Run Sync Script
      #   env:
      #     # 以下变量请在项目 Settings -> Secrets 中配置
      #     MINEBBS_COOKIE: ${{ secrets.MINEBBS_COOKIE }}
      #     # 以下变量可根据实际情况修改
      #     MINEBBS_TARGET_URL: 'https://www.minebbs.com/resources/sparkbridge-bot-qq.15586/post-update'
      #     MINEBBS_FILE_PATH: './sparkbridge3.zip' # ！！请修改为你打包出的文件实际路径
      #     MINEBBS_VERSION: ${{ github.event.release.tag_name }}
      #     MINEBBS_UPDATE_TITLE: 'GitHub 同步: ${{ github.event.release.name }}'
      #     MINEBBS_CHANGE_LOG: ${{ github.event.release.body }}
      #   run: node upload.js

      # 6. 发布到 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            自动构建发布
            Tag: ${{ github.ref_name }}
          files: |
            sparkbridge3.zip
            update-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}